<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>

  <!-- Favicon (reliable setup) -->
  <link rel="shortcut icon" href="favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(-45deg, #0f172a, #1e293b, #1e3a8a, #0ea5e9);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      max-width: 600px;
      padding: 50px 40px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      animation: fadeInUp 1s ease forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .badge {
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 15px;
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3.2rem;
      margin: 0 0 15px;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.6;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="badge">Join Our Minecraft Server</div>
    <h1>play.roliicecream.com</h1>
  </div>

  <!-- Animated favicon (may not always update in Chrome, but safe to include) -->
  <script>
    const favicon = document.getElementById('favicon');
    let blinking = false;
  </script>
</body>
</html>
