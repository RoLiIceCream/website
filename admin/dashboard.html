<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        :root {
            --sidebar-width: 240px;
            --primary-bg: #f8f9fa;
            --sidebar-color: #2d3436;
            --accent-color: #0984e3;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; background: var(--primary-bg); }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-color);
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: #dfe6e9;
            padding: 15px 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #4b5557;
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* Main Content Area */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 15px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Statistical Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .card h3 { margin: 0; font-size: 24px; color: var(--accent-color); }
        .card p { color: #636e72; margin: 5px 0 0; }

        /* Data Table */
        .data-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background: #fdfdfd; color: #2d3436; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="text-align: center;">AdminUI</h2>
        <a href="#" class="active">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Analytics</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
    </aside>

    <main class="main-content">
        <header>
            <h1>System Overview</h1>
            <div class="user-profile">Admin Name ▼</div>
        </header>

        <section class="stats-grid">
            <div class="card"><h3>1,250</h3><p>Total Sales</p></div>
            <div class="card"><h3>+12%</h3><p>Growth</p></div>
            <div class="card"><h3>842</h3><p>Active Users</p></div>
            <div class="card"><h3>15</h3><p>Pending Tasks</p></div>
        </section>

        <section class="data-section">
            <h2>Recent Activities</h2>
            <table>
                <thead>
                    <tr><th>User</th><th>Status</th><th>Date</th></tr>
                </thead>
                <tbody>
                    <tr><td>John Doe</td><td><span style="color:green">Active</span></td><td>May 1, 2024</td></tr>
                    <tr><td>Jane Smith</td><td><span style="color:orange">Pending</span></td><td>Apr 28, 2024</td></tr>
                    <tr><td>Server Node 4</td><td><span style="color:red">Offline</span></td><td>Apr 27, 2024</td></tr>
                </tbody>
            </table>
        </section>
    </main>

</body>
</html>
