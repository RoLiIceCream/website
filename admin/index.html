<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>
    <!-- Adding Google Fonts for a more professional look -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* Dark admin theme background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .admin-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: #1a202c;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            color: #718096;
            font-size: 14px;
            margin-top: 8px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: #4a5568;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        .admin-btn {
            width: 100%;
            padding: 14px;
            background-color: #2d3748; /* Solid dark button */
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.3s;
        }

        .admin-btn:hover {
            background-color: #1a202c;
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 13px;
        }

        .footer-links a {
            color: #4a90e2;
            text-decoration: none;
        }

        .badge {
            display: inline-block;
            background: #fed7d7;
            color: #c53030;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="header">
            <span class="badge">RESTRICTED AREA</span>
            <h1>Control Panel</h1>
            <p>Please enter your admin credentials</p>
        </div>

        <form action="/admin/dashboard" method="POST">
            <div class="input-group">
                <label>Admin ID</label>
                <input type="text" name="admin_user" placeholder="e.g. admin_01" required>
            </div>

            <div class="input-group">
                <label>Security Key</label>
                <input type="password" name="admin_pass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="admin-btn">Authorize Entry</button>
        </form>

        <div class="footer-links">
            <a href="#">System Recovery</a> • <a href="#">Server Status</a>
        </div>
    </div>

</body>
</html>
