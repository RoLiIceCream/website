<!DOCTYPE html>
<html>
<head>
    <title>Roli Ice Cream Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="login-form">
        <h1>Admin Login</h1>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="handleLogin()">Login</button>
    </div>

    <script>
        // Replace these with your actual keys from your code
        const SUPABASE_URL = 'https://ersucttsvhjrwyxtoabv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyc3VjdHRzdmhqcnd5eHRvYWJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzODgzNzksImV4cCI6MjA5MDk2NDM3OX0.I-_benQqG7oCmgQ0LPMQZxV9TghfvbFiweadX2R6MJA';
        const rolisupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await rolisupabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                // Success! Move to the dashboard
                window.location.href = "/admin/dashboard";
            }
        }
    </script>
</body>
</html>
